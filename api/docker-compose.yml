services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: baton
      POSTGRES_PASSWORD: baton
      POSTGRES_DB: baton
    ports:
      - "5433:5432" # host 5433 — 5432 is often taken by a local Postgres
    volumes:
      - baton-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baton -d baton"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  baton-pgdata:
